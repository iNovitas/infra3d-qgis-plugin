      <!-- Sidebar navigation to quickly change projects -->
      <aside id="sidebar">
        <div id="sidebarInner">
          <p id="sidebarHeader" class="title" data-i18n="projectsTitle">
            Projects
          </p>

          <!-- Project cards are placed in a container -->
          <div id="projectContainer"></div>
          <!-- Toggle project selection (show/hide) -- SVG (folder-symbol) as symbol for toggling-->
        </div>
        <div id="projectToggle">
          <button id="projectToggleBtn" class="infra3dButton">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2m0 12H4V8h16z"
              />
            </svg>
          </button>
        </div>
      </aside>
      <main id="content">
        <div id="projectPlaceholder">
          <img
            id="logo"
            src="{{ url_for('static', filename='assets/search.webp') }}"
            alt="Placeholder image to indicate that no project is currently open."
          />
          <p data-i18n="projectPlaceholderText">
            Please select a project from the sidebar to load it.
          </p>
        </div>
        <!-- NOTE you cannot give the id "infra3d" anymore, else the overlay won`t be displayed! Therefore, the infra3d component is placed in the id="viewer"-->
        <div id="viewer"></div>
      </main>
    </div>
  </body>
  <script>
    (function () {
      const translations = {
        de: {
          projectsTitle: "Projekte",
          projectPlaceholderText:
            "Bitte wählen Sie ein Projekt aus der Seitenleiste, um es zu laden.",
        },
        fr: {
          projectsTitle: "Projets",
          projectPlaceholderText:
            "Veuillez sélectionner un projet dans la barre latérale pour le charger.",
        },
        en: {
          projectsTitle: "Projects",
          projectPlaceholderText:
            "Please select a project from the sidebar to load it.",
        },
      };

      const defaultLocale = "en";
      let locale = defaultLocale;

      switch (navigator.language.toLowerCase().substring(0, 2)) {
        case "de":
          locale = "de";
          break;
        case "fr":
          locale = "fr";
          break;
        default:
          locale = defaultLocale;
      }

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (translations[locale] && translations[locale][key]) {
          el.textContent = translations[locale][key];
        }
      });
    })();
  </script>
